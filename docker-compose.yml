services:
  app:
    build:
      context: .
      dockerfile: infra/docker/app.Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql+psycopg2://watchtower:watchtower@db:5432/watchtower
      - AUTO_CREATE_DB=false
      - PROMETHEUS_METRICS_PATH=/metrics
      - LOG_LEVEL=INFO
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - CORS_ORIGINS=http://localhost:3001
      - RATE_LIMIT_REDIS_URL=redis://redis:6379/3
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    command: ["celery", "-A", "worker.celery_app", "worker", "--pool=threads", "--loglevel=INFO"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql+psycopg2://watchtower:watchtower@db:5432/watchtower
      - AUTO_CREATE_DB=false
      - LOG_LEVEL=INFO
    depends_on:
      - redis
      - db
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=INFO"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - DATABASE_URL=postgresql+psycopg2://watchtower:watchtower@db:5432/watchtower
      - AUTO_CREATE_DB=false
      - LOG_LEVEL=INFO
    depends_on:
      - redis
      - db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=watchtower
      - POSTGRES_USER=watchtower
      - POSTGRES_PASSWORD=watchtower
    ports:
      - "5432:5432"
    volumes:
      - watchtower-db:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3001
    depends_on:
      - app
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  watchtower-db:
